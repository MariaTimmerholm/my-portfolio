<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Maria Timmerholm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <header class="fade-in delay-1 fade-section border-bottom border-secondary">
      <h1>Maria Timmerholm</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
        <a href="random.html">Random</a>
      </nav>
    </header>
    <main class="container contact-page fade-in delay-2 fade-section">
      <section class="contact-card">
        <div class="row g-5 align-items-start">
          <div class="col-lg-5">
            <h2>Let’s get in touch</h2>
            <p>
              Have a question, an idea, or a project in mind? I’d love to hear from you.
            </p>

            <div class="contact-info mt-4">
              <p><strong>Email:</strong><br>
                <a href="mailto:timmerholmmaria@gmail.com">timmerholmmaria@gmail.com</a>
              </p>

              <p><strong>Socials:</strong></p>
              <div class="social-links text-start">
                <a href="https://www.linkedin.com/in/maria-timmerholm-558041135/" target="_blank">LinkedIn</a>
                <a href="https://www.instagram.com/mariat.design" target="_blank">Instagram</a>
                <a href="https://www.behance.net/mariatimmerholm" target="_blank">Behance</a>
              </div>
            </div>
          </div>
          <div class="col-lg-7">
            <form action="https://formsubmit.co/timmerholmmaria@gmail.com" method="POST" class="contact-form">
              <!-- FormSubmit settings -->
              <input type="hidden" name="_captcha" value="false">
              <input type="hidden" name="_subject" value="New message from portfolio website">
              <input type="hidden" name="_next" value="thanks.html">
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input id="name" type="text" name="name" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" name="email" class="form-control" required>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea id="message" name="message" rows="6" class="form-control" required></textarea>
              </div>
              <button type="submit" class="btn btn-dark px-4">Send message</button>
            </form>
          </div>
        </div>
      </section>
    </main>
    <footer class="fade-in text-center border-top border-secondary delay-3 fade-section">
      <p>&copy; 2026 Maria Timmerholm</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
